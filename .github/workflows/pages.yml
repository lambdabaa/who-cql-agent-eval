name: Deploy GitHub Pages

# Replaces GitHub's built-in "deploy from a branch" workflow so we can
# check out *without* recursing into vendored DAK submodules. The
# upstream smart-hiv repo has a stray gitlink (`smart-hiv/smart-hiv`)
# with no matching .gitmodules entry, which breaks `git submodule
# update --recursive`. The static leaderboard under docs/ only needs
# the committed files, so we skip submodules entirely.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (no submodules)
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload docs/ artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
